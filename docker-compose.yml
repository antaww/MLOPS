services:
  api:
    build: .
    container_name: whisper-qa-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: whisper-qa-cache
    restart: unless-stopped

volumes:
  hf_cache:
