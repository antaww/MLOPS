services:
  api:
    build: .
    container_name: whisper-qa-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - redis
    restart: unless-stopped

  locust:
    build: .
    container_name: whisper-qa-locust
    ports:
      - "8089:8089"
    volumes:
      - .:/app
    command: locust -f tests/load/locustfile.py --host http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: whisper-qa-cache
    restart: unless-stopped

volumes:
  hf_cache:
