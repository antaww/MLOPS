services:
  api:
    build: .
    container_name: whisper-qa-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  locust:
    build: .
    container_name: whisper-qa-locust
    ports:
      - "8089:8089"
    volumes:
      - .:/app
    command: locust -f tests/load/locustfile.py --host http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: whisper-qa-cache
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: whisper-qa-tunnel
    command: tunnel --no-autoupdate --url http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  locust-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: whisper-qa-locust-tunnel
    command: tunnel --no-autoupdate --url http://locust:8089
    depends_on:
      - locust
    restart: unless-stopped

volumes:
  hf_cache:
